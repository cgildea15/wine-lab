<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Wine Predictor Model</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>🍷 AI Wine Predictor Model</h1></header>
    <main>
        <form id="wine-form">
            <h2 id="form-title">Enter Wine Details</h2>
            
            <div class="input-group">
                <label for="labelName">Vineyard / Label Name</label>
                <input type="text" id="labelName" required placeholder="e.g. Nádas Wine Workshop">
            </div>

            <div class="input-group">
                <label for="purchaseLocation">Purchase Location</label>
                <select id="purchaseLocation">
                    <option value="retail">🏪 Store / Online</option>
                    <option value="restaurant">🍴 Restaurant / Bar</option>
                    <option value="vineyard">🍇 Direct from Vineyard</option>
                </select>
            </div>

            <div class="input-group">
                <label for="wineStyle">Style / Blend</label>
                <input type="text" id="wineStyle" placeholder="e.g. Orange, Pinot Gris">
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="temp">Serving Temp</label>
                    <select id="temp">
                        <option value="chilled">❄️ Chilled</option>
                        <option value="room">🌡️ Room Temp</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="setting">Environment & Timing</label>
                    <select id="setting">
                        <option value="afternoon_outdoors">☀️ Afternoon / Outdoors</option>
                        <option value="evening_outdoors">🌙 Evening / Outdoors</option>
                        <option value="afternoon_indoors">🏠 Afternoon / Indoors</option>
                        <option value="evening_indoors">🍷 Evening / Indoors</option>
                    </select>
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="vintage">Year</label>
                    <input type="number" id="vintage" placeholder="2023">
                </div>
                <div class="input-group">
                    <label for="abv">ABV %</label>
                    <input type="number" id="abv" step="0.1" placeholder="12.5">
                </div>
                <div class="input-group">
                    <label for="price">Price ($)</label>
                    <input type="number" id="price" step="0.01" placeholder="15.98">
                </div>
            </div>

            <div class="input-group">
                <label for="region">Region(s) (comma separated)</label>
                <input type="text" id="region" placeholder="France, Limoux">
            </div>

            <div class="input-group">
                <label for="predictNotes">Known Notes (comma separated)</label>
                <input type="text" id="predictNotes" placeholder="Minerals, Saline, Citrus">
            </div>

            <button type="submit" id="predict-btn">Predict Our Scores</button>
        </form>

        <section id="results">
            <div class="score-container">
                <div class="score-card colleen-card">
                    <span class="score-label">COLLEEN</span>
                    <div id="c-score-val">--</div>
                </div>
                <div class="score-card dave-card">
                    <span class="score-label">DAVE</span>
                    <div id="d-score-val">--</div>
                </div>
            </div>

            <div id="feedback-section" style="display:none;">
                <h3>Actual Tasting Results</h3>
                <div class="input-group">
                    <label for="actual-rating">Final Lab Rating (1-10)</label>
                    <input type="number" id="actual-rating" min="1" max="10" step="0.1">
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="buyAgain">
                    <label for="buyAgain">WOULD BUY AGAIN?</label>
                </div>
                <div class="input-group">
                    <label for="user-name">Who is tasting?</label>
                    <input type="text" id="user-name" placeholder="Colleen, Dave">
                </div>
                <button id="save-rating">Confirm & Save to Lab</button>
            </div>
        </section>

        <section id="cellar-history">
            <h2>📜 Recent Discoveries</h2>
            <div id="history-list"></div>
        </section>
    </main>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>

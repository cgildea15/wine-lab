<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Lab Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>🍷 Wine Lab Predictor</h1></header>
    <main>
        <form id="wine-form">
            <h2 id="form-title">Enter Wine Details</h2>
            
            <label for="labelName">Vineyard / Label Name:</label>
            <input type="text" id="labelName" required placeholder="e.g. Dr. Loosen or Amarone">

            <label for="wineStyle">Style / Blend:</label>
            <input type="text" id="wineStyle" placeholder="e.g. Riesling, Orange, or Valpolicella">

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label for="purchaseContext">Context:</label>
                    <select id="purchaseContext" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px;">
                        <option value="retail">🏪 Store</option>
                        <option value="restaurant">🍴 Restaurant</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label for="temp">Serving Temp:</label>
                    <select id="temp" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px;">
                        <option value="chilled">❄️ Chilled</option>
                        <option value="room">🌡️ Room Temp</option>
                    </select>
                </div>
            </div>

            <label for="setting">Current Vibe:</label>
            <select id="setting" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px;">
                <option value="home">🏠 Home / Night</option>
                <option value="water">🌊 By the Water / Afternoon</option>
                <option value="social">🎉 Social / Event</option>
            </select>

            <label for="pairing">What are we eating?</label>
            <input type="text" id="pairing" placeholder="e.g. Heavy Pasta, Spicy, or No Food">

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label for="price">Price ($):</label>
                    <input type="number" id="price" step="0.01" placeholder="12.00">
                </div>
                <div style="flex: 1;">
                    <label for="abv">ABV %:</label>
                    <input type="number" id="abv" step="0.1" placeholder="13.5">
                </div>
            </div>

            <label for="region">Region/City:</label>
            <input type="text" id="region" placeholder="e.g. Germany or Italy">

            <button type="submit" id="predict-btn" style="margin-top:20px;">Predict Our Scores</button>
        </form>

        <section id="results">
            <div style="display: flex; justify-content: space-around; margin-bottom: 20px; gap: 10px;">
                <div id="colleen-score" style="text-align: center; background: #fff5f5; padding: 15px; border-radius: 8px; border: 1px solid #800020; flex: 1;">
                    <span style="font-size: 0.8rem; color: #800020; font-weight: bold;">COLLEEN</span>
                    <div id="c-score-val" style="font-size: 2rem; font-weight: bold;">--</div>
                </div>
                <div id="dave-score" style="text-align: center;

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Lab Predictor</title>
    <link rel="stylesheet" href="style.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org/",
      "@type": "Product",
      "name": "Conte Rosso",
      "category": "Red Wine",
      "manufacturer": "Il Conte Villa Prandone",
      "additionalProperty": [
        {
          "@type": "PropertyValue",
          "name": "Grape",
          "value": "Sangiovese, Montepulciano"
        },
        {
          "@type": "PropertyValue",
          "name": "Region",
          "value": "Marche, Italy"
        },
        {
          "@type": "PropertyValue",
          "name": "Process",
          "value": "Stainless Steel" 
        },
        {
          "@type": "PropertyValue",
          "name": "SmokyTrigger",
          "value": false
        }
      ]
    }
    </script>
</head>
<body>
    <header>
        <h1>🍷 Wine Lab Predictor</h1>
    </header>

    <main>
        <form id="wine-form" aria-labelledby="form-title">
            <h2 id="form-title">Enter Wine Details</h2>
            
            <label for="labelName">Vineyard / Label Name:</label>
            <input type="text" id="labelName" name="labelName" placeholder="e.g. Natura" required>

            <label for="wineStyle">Wine Style / Grape Blend:</label>
            <input type="text" id="wineStyle" name="wineStyle" placeholder="e.g. Rosé or Red Blend">

            <label for="vintage">Vintage (Year):</label>
            <input type="number" id="vintage" name="vintage" min="1900" max="2099" placeholder="2024">

            <label for="abv">ABV % (Alcohol):</label>
            <input type="number" id="abv" name="abv" min="0" max="25" step="0.1" placeholder="e.g. 13.5">

            <label for="region">Region/City:</label>
            <input type="text" id="region" name="region" placeholder="e.g. Casablanca Valley, Chile">

            <fieldset style="border:none; padding:0; margin-top:1rem;">
                <legend style="font-weight:bold; margin-bottom:5px;">Is it Oaky/Smoky?</legend>
                <label class="switch">
                    <input type="checkbox" id="isOaky" aria-label="Is the wine oaky or smoky?">
                    <span class="slider round"></span>
                </label>
            </fieldset>

            <button type="submit" style="margin-top:20px;">Predict Our Scores</button>
        </form>

        <section id="results" aria-live="polite">
            <div id="colleen-score"></div>
            <div id="dave-score"></div> </section>
    </main>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Lab Predictor</title>
    <link rel="stylesheet" href="style.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org/",
      "@type": "Product",
      "name": "Wine Lab Entry",
      "category": "Wine"
    }
    </script>
</head>
<body>
    <header>
        <h1>🍷 Wine Lab Predictor</h1>
    </header>

    <main>
        <form id="wine-form" aria-labelledby="form-title">
            <h2 id="form-title">Enter Wine Details</h2>
            
            <label for="labelName">Vineyard / Label Name:</label>
            <input type="text" id="labelName" name="labelName" placeholder="e.g. Natura" required>

            <label for="wineStyle">Wine Style / Grape Blend:</label>
            <input type="text" id="wineStyle" name="wineStyle" placeholder="e.g. Rosé or Red Blend">

            <label for="vintage">Vintage (Year):</label>
            <input type="number" id="vintage" name="vintage" min="1900" max="2099" placeholder="2024">

            <label for="abv">ABV % (Alcohol):</label>
            <input type="number" id="abv" name="abv" min="0" max="25" step="0.1" placeholder="e.g. 13.5">

            <label for="region">Region/City:</label>
            <input type="text" id="region" name="region" placeholder="e.g. Casablanca Valley, Chile">

            <label for="price">Price ($):</label>
            <input type="number" id="price" name="price" step="0.01" placeholder="e.g. 14.99">

            <button type="submit" style="margin-top:20px;">Predict Our Scores</button>
        </form>

        <section id="results" aria-live="polite">
            <div id="colleen-score"></div>
            <div id="dave-score"></div> 

            <div id="feedback-section" style="display:none; margin-top:20px; border-top:2px solid #800020; padding-top:15px;">
                <h3>Actual Tasting Results</h3>
                
                <fieldset style="border:none; padding:0; margin-bottom:1rem;">
                    <legend style="font-weight:bold;">Was it Oaky/Smoky?</legend>
                    <label class="switch">
                        <input type="checkbox" id="actualOaky">
                        <span class="slider round"></span>
                    </label>
                </fieldset>

                <fieldset style="border:none; padding:0; margin-bottom:1rem;">
                    <legend style="font-weight:bold;">Would Buy Again?</legend>
                    <label class="switch">
                        <input type="checkbox" id="buyAgain">
                        <span class="slider round"></span>
                    </label>
                </fieldset>

                <label for="actual-colleen">Colleen's Actual Rating (1-10):</label>
                <input type="number" id="actual-colleen" min="1" max="10" step="0.1" placeholder="9.0">
                
                <label for="actual-dave">Dave's Actual Rating (1-10):</label>
                <input type="number" id="actual-dave" min="1" max="10" step="0.1" placeholder="8.5">
                
                <button id="save-rating" style="background-color: #4a0e0e; margin-top:15px;">Confirm & Save to History</button>
            </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>

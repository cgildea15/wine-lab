<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Lab Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>🍷 Wine Lab Predictor</h1></header>
    <main>
        <form id="wine-form">
            <h2 id="form-title">Enter Wine Details</h2>
            
            <div class="input-group">
                <label for="labelName">Vineyard / Label Name</label>
                <input type="text" id="labelName" required placeholder="e.g. Dr. Loosen">
            </div>

            <div class="input-group">
                <label for="wineStyle">Style / Blend</label>
                <input type="text" id="wineStyle" placeholder="e.g. Riesling or Orange">
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="purchaseContext">Context</label>
                    <select id="purchaseContext">
                        <option value="retail">🏪 Store</option>
                        <option value="restaurant">🍴 Restaurant</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="temp">Serving Temp</label>
                    <select id="temp">
                        <option value="chilled">❄️ Chilled</option>
                        <option value="room">🌡️ Room Temp</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label for="setting">Current Vibe</label>
                <select id="setting">
                    <option value="home">🏠 Home / Night</option>
                    <option value="water">🌊 By the Water</option>
                    <option value="social">🎉 Social / Event</option>
                </select>
            </div>

            <div class="input-group">
                <label for="pairing">What are we eating?</label>
                <input type="text" id="pairing" placeholder="e.g. Heavy Pasta">
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="vintage">Year</label>
                    <input type="number" id="vintage" placeholder="2022">
                </div>
                <div class="input-group">
                    <label for="abv">ABV %</label>
                    <input type="number" id="abv" step="0.1" placeholder="13.5">
                </div>
            </div>

            <div class="input-group">
                <label for="price">Price ($)</label>
                <input type="number" id="price" step="0.01" placeholder="12.00">
            </div>

            <div class="input-group">
                <label for="region">Region(s)</label>
                <input type="text" id="region" placeholder="e.g. Spain, Navarra">
            </div>

            <button type="submit" id="predict-btn">Predict Our Scores</button>
        </form>

        <section id="results">
            <div class="score-container">
                <div class="score-card colleen-card">
                    <span class="score-label">COLLEEN</span>
                    <div id="c-score-val">--</div>
                </div>
                <div class="score-card dave-card">
                    <span class="score-label">DAVE</span>
                    <div id="d-score-val">--</div>
                </div>
            </div>

            <div id="feedback-section" style="display:none;">
                <h3>Actual Tasting Results</h3>
                <div class="input-group">
                    <label for="user-name">Who is tasting?</label>
                    <input type="text" id="user-name" placeholder="Colleen, Dave, or Brother?">
                </div>
                
                <div class="checkbox-row">
                    <label><input type="checkbox" id="actualOaky"> Oaky/Smoky?</label>
                    <label><input type="checkbox" id="buyAgain"> Buy Again?</label>
                </div>

                <div class="input-group">
                    <label for="tastingNotes">Notes (Strawberry, Saline, etc)</label>
                    <input type="text" id="tastingNotes" placeholder="Notes">
                </div>
                
                <div class="input-group">
                    <label for="flavorVibe">Overall Vibe</label>
                    <select id="flavorVibe">
                        <option value="balanced">Balanced</option>
                        <option value="loved">Loved it!</option>
                        <option value="disliked">Not for me</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="actual-rating">Final Lab Rating (1-10)</label>
                    <input type="number" id="actual-rating" min="1" max="10" step="0.1">
                </div>
                
                <button id="save-rating">Confirm & Save</button>
            </div>
        </section>

        <section id="cellar-history">
            <h2>📜 Recent Discoveries</h2>
            <div id="history-list"></div>
        </section>
    </main>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Wine Predictor</title>
    <meta name="theme-color" content="#800020">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-512.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>🍷 AI Wine Predictor</h1></header>
    <main>
        <form id="wine-form">
            <div id="prediction-stage">
                <h2 id="form-title">Pre-Purchase Analysis</h2>
                
                <div class="input-group">
                    <label for="labelName">Vineyard / Label Name</label>
                    <input type="text" id="labelName" required placeholder="e.g. Domaine Weinbach Muscat">
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="purchaseLocation">Location</label>
                        <select id="purchaseLocation">
                            <option value="retail">🏪 Store</option>
                            <option value="restaurant">🍴 Restaurant</option>
                            <option value="vineyard">🍇 Vineyard</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="sweetness">Sweetness</label>
                        <select id="sweetness">
                            <option value="dry">🌵 Dry</option>
                            <option value="off-dry">🍑 Off-Dry</option>
                            <option value="sweet">🍯 Sweet</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="wineStyle">Style / Blend</label>
                    <input type="text" id="wineStyle" placeholder="e.g. White, Chardonnay">
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="vintage">Year</label>
                        <input type="number" id="vintage" placeholder="2021">
                    </div>
                    <div class="input-group">
                        <label for="price">Price ($)</label>
                        <input type="number" id="price" step="0.01" placeholder="21.99">
                    </div>
                </div>

                <div class="input-group">
                    <label for="predictNotes">Tasting Notes</label>
                    <input type="text" id="predictNotes" placeholder="e.g. Saline, Pineapple, Vanilla">
                </div>

                <button type="submit" id="predict-btn">Predict Compatibility</button>
            </div>

            <div id="feedback-stage" style="display:none;">
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
                <h3>Post-Tasting Log</h3>
                
                <div class="input-row">
                    <div class="input-group">
                        <label for="temp">Serving Temp</label>
                        <select id="temp">
                            <option value="chilled">❄️ Chilled</option>
                            <option value="room">🌡️ Room Temp</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="setting">Setting</label>
                        <select id="setting">
                            <option value="afternoon_in">☀️ Afternoon Inside</option>
                            <option value="afternoon_out">🌳 Afternoon Outside</option>
                            <option value="evening_in">🌙 Evening Inside</option>
                            <option value="evening_out">🌃 Evening Outside</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="foodPairing">Food Pairing (Optional)</label>
                    <input type="text" id="foodPairing" placeholder="e.g. Grilled Salmon, Pasta">
                </div>

                <div class="input-group">
                    <label for="actualStyle">Actual Style</label>
                    <select id="actualStyle">
                        <option value="old-world">🌍 Old World Crisp</option>
                        <option value="fruit-forward">🍓 Fruity and Smooth</option>
                    </select>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="actual-rating">Rating (1-10)</label>
                        <input type="number" id="actual-rating" min="1" max="10" step="0.1" placeholder="0.0">
                    </div>
                    <div class="input-group">
                        <label>Buy Again?</label>
                        <select id="buyAgain">
                            <option value="true">✅ Yes</option>
                            <option value="false">❌ No</option>
                        </select>
                    </div>
                </div>
                
                <button type="button" id="final-log-btn">Finalize Log</button>
            </div>
        </form>

        <section id="results" style="display:none;">
            <div class="score-container">
                <div class="score-card dry-card">
                    <span class="score-label">OLD WORLD CRISP</span>
                    <div id="c-score-val">--</div>
                </div>
                <div class="score-card fruit-card">
                    <span class="score-label">FRUITY & SMOOTH</span>
                    <div id="d-score-val">--</div>
                </div>
            </div>
        </section>

        <section id="cellar-history">
            <h2>📜 Recent Discoveries</h2>
            <div id="history-list"></div>
        </section>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
      import { getFirestore } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";
      import { firebaseConfig } from "./config.js"; 
      
      const app = initializeApp(firebaseConfig);
      window.db = getFirestore(app);
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
